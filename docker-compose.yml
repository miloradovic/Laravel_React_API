services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel_insurance_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_bootstrap_cache:/var/www/html/bootstrap/cache
    environment:
      - APP_NAME=TravelInsuranceAPI
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    networks:
      - travel_insurance_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel_insurance_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=120
      - VITE_HMR_HOST=localhost
      - VITE_HMR_PORT=3000
    networks:
      - travel_insurance_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  travel_insurance_network:
    driver: bridge

volumes:
  backend_vendor:
  backend_bootstrap_cache:
  frontend_node_modules: